<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="تطبيق تتبع الطلبات للتجار الإلكترونيين">
    <meta name="theme-color" content="#2c3e50">
    <title>COD TP - تطبيق تتبع الطلبات</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect fill='%232c3e50' width='100' height='100'/><text x='50' y='70' font-size='60' font-weight='bold' fill='white' text-anchor='middle'>COD</text></svg>">
    <link rel="stylesheet" href="css/styles.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <div id="app" class="app-container">
        <!-- صفحة تسجيل الدخول -->
        <div id="loginPage" class="page active">
            <div class="login-container">
                <div class="login-header">
                    <div class="logo">COD TP</div>
                    <h1>تطبيق تتبع الطلبات</h1>
                    <p>إدارة متقدمة لطلباتك بكل سهولة</p>
                </div>
                
                <form id="loginForm" class="login-form">
                    <div class="form-group">
                        <label for="loginEmail">البريد الإلكتروني</label>
                        <input 
                            type="email" 
                            id="loginEmail" 
                            placeholder="أدخل بريدك الإلكتروني"
                            required
                        >
                        <span class="error-message" id="emailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">كلمة المرور</label>
                        <input 
                            type="password" 
                            id="loginPassword" 
                            placeholder="أدخل كلمة المرور"
                            required
                        >
                        <span class="error-message" id="passwordError"></span>
                    </div>

                    <div class="form-group checkbox">
                        <input type="checkbox" id="rememberMe">
                        <label for="rememberMe">تذكرني</label>
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">دخول</button>
                </form>

                <div class="login-footer">
                    <p>ليس لديك حساب؟ 
                        <a href="#" id="switchToSignup" class="link">إنشاء حساب جديد</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- صفحة التسجيل -->
        <div id="signupPage" class="page">
            <div class="login-container">
                <div class="login-header">
                    <div class="logo">COD TP</div>
                    <h1>إنشاء حساب جديد</h1>
                    <p>ابدأ بإدارة طلباتك الآن</p>
                </div>
                
                <form id="signupForm" class="login-form">
                    <div class="form-group">
                        <label for="signupName">اسم المتجر</label>
                        <input 
                            type="text" 
                            id="signupName" 
                            placeholder="اسم متجرك الإلكتروني"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupEmail">البريد الإلكتروني</label>
                        <input 
                            type="email" 
                            id="signupEmail" 
                            placeholder="بريدك الإلكتروني"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupPhone">رقم الهاتف</label>
                        <input 
                            type="tel" 
                            id="signupPhone" 
                            placeholder="+213 5XX XXX XXX"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="signupPassword">كلمة المرور</label>
                        <input 
                            type="password" 
                            id="signupPassword" 
                            placeholder="أدخل كلمة مرور قوية"
                            required
                        >
                        <div class="password-strength" id="passwordStrength"></div>
                    </div>

                    <div class="form-group">
                        <label for="signupConfirmPassword">تأكيد كلمة المرور</label>
                        <input 
                            type="password" 
                            id="signupConfirmPassword" 
                            placeholder="أعد إدخال كلمة المرور"
                            required
                        >
                    </div>

                    <button type="submit" class="btn btn-primary btn-lg">إنشاء حساب</button>
                </form>

                <div class="login-footer">
                    <p>هل لديك حساب بالفعل؟ 
                        <a href="#" id="switchToLogin" class="link">تسجيل الدخول</a>
                    </p>
                </div>
            </div>
        </div>

        <!-- صفحة لوحة التحكم -->
        <div id="dashboardPage" class="page">
            <!-- الشريط العلوي -->
            <nav class="navbar">
                <div class="navbar-brand">
                    <div class="logo">COD TP</div>
                </div>
                <ul class="navbar-menu">
                    <li><a href="#" class="nav-link active" data-page="dashboard">لوحة التحكم</a></li>
                    <li><a href="#" class="nav-link" data-page="orders">الطلبات</a></li>
                    <li><a href="#" class="nav-link" data-page="agents">الوكلاء</a></li>
                    <li><a href="#" class="nav-link" data-page="integrations">الربط</a></li>
                    <li><a href="#" class="nav-link" data-page="statistics">الإحصائيات</a></li>
                    <li><a href="#" class="nav-link" data-page="settings">الإعدادات</a></li>
                </ul>
                <div class="navbar-end">
                    <div class="user-info">
                        <span id="userNameDisplay">مستخدم</span>
                        <button id="logoutBtn" class="btn btn-outline btn-sm">خروج</button>
                    </div>
                </div>
            </nav>

            <!-- محتوى لوحة التحكم -->
            <div class="dashboard-content">
                <div id="dashboardContainer"></div>
                <div id="ordersContainer" style="display:none;"></div>
                <div id="agentsContainer" style="display:none;"></div>
                <div id="integrationsContainer" style="display:none;"></div>
                <div id="statisticsContainer" style="display:none;"></div>
                <div id="settingsContainer" style="display:none;"></div>
            </div>
        </div>
    </div>

    <!-- تنبيهات وإخطارات -->
    <div id="notificationContainer" class="notification-container"></div>

    <!-- Modal عام -->
    <div id="modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modalTitle"></h2>
                <button class="modal-close">&times;</button>
            </div>
            <div id="modalBody" class="modal-body"></div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="modalCancel">إلغاء</button>
                <button class="btn btn-primary" id="modalConfirm">تأكيد</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="js/utils.js"></script>
    <script src="js/database.js"></script>
    <script src="js/api.js"></script>
    <script src="js/agents.js"></script>
    <script src="js/orders.js"></script>
    <script src="js/integrations.js"></script>
    <script src="js/statistics.js"></script>
    <script src="js/app.js"></script>

    <script>
        // تسجيل Service Worker
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('service-worker.js')
                .then(reg => console.log('Service Worker registered'))
                .catch(err => console.log('Service Worker registration failed'));
        }
    </script>
</body>
</html>
